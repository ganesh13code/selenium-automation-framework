# =============================================================
# HYBRID FRAMEWORK - config.properties
# =============================================================
# CONCEPT: Externalizing configuration
# All runtime values live HERE, not hardcoded in Java.
# To switch browsers or environments, edit this file only.
# For multi-environment setups, create:
#   config-qa.properties, config-staging.properties, config-prod.properties
# and load the right one based on a Maven profile or JVM argument.
# =============================================================

# ---------------------------
# Browser Configuration
# ---------------------------
# Supported values: chrome | firefox | edge
browser=chrome

# Run browser without a visible window (great for CI/CD pipelines)
# true = headless mode, false = visible browser
headless=false

# ---------------------------
# Application URL
# ---------------------------
base.url=https://the-internet.herokuapp.com/login

# ---------------------------
# Timeouts (in seconds)
# ---------------------------
# implicit.wait  : How long WebDriver polls the DOM for each findElement call
# explicit.wait  : Max time WebDriverWait waits for a specific condition
# page.load.timeout : Max time to wait for a full page to load
implicit.wait=10
explicit.wait=20
page.load.timeout=30

# ---------------------------
# Output Directories
# ---------------------------
screenshot.dir=test-output/screenshots
report.dir=test-output/reports
report.name=HybridFrameworkReport
